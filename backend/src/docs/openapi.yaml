openapi: 3.0.3
info:
  title: AI Agents Management Platform API
  description: |
    Enterprise-grade API for managing AI agents, executions, tools, and analytics.
    
    ## Authentication
    This API uses JWT Bearer token authentication. Include the token in the `Authorization` header:
    ```
    Authorization: Bearer <your_access_token>
    ```
    
    ## Rate Limiting
    - API endpoints: 100 requests per minute
    - Auth endpoints: 5 requests per minute
    
    ## WebSocket
    Real-time updates available at `/socket.io` for run streaming and notifications.
    
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3001
    description: Development server
  - url: https://api.yourdomain.com
    description: Production server

tags:
  - name: Auth
    description: Authentication and authorization
  - name: Users
    description: User management
  - name: Agents
    description: AI agent CRUD operations
  - name: Runs
    description: Agent execution management
  - name: Tools
    description: Tool configuration
  - name: Analytics
    description: Usage analytics and metrics
  - name: Audit
    description: Audit logs

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDto'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== AGENTS ====================
  /agents:
    get:
      tags: [Agents]
      summary: List agents
      operationId: listAgents
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AgentStatus'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Agents]
      summary: Create agent
      operationId: createAgent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentDto'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /agents/{id}:
    get:
      tags: [Agents]
      summary: Get agent by ID
      operationId: getAgent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Agents]
      summary: Update agent
      operationId: updateAgent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentDto'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Agents]
      summary: Delete agent
      operationId: deleteAgent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Agent deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{id}/clone:
    post:
      tags: [Agents]
      summary: Clone agent
      operationId: cloneAgent
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Agent cloned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

  # ==================== RUNS ====================
  /runs:
    get:
      tags: [Runs]
      summary: List runs
      operationId: listRuns
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: agentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RunStatus'
      responses:
        '200':
          description: List of runs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'

    post:
      tags: [Runs]
      summary: Start new run
      operationId: createRun
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunDto'
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  /runs/{id}:
    get:
      tags: [Runs]
      summary: Get run by ID
      operationId: getRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Run details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'
        '404':
          $ref: '#/components/responses/NotFound'

  /runs/{id}/cancel:
    post:
      tags: [Runs]
      summary: Cancel run
      operationId: cancelRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Run'

  # ==================== TOOLS ====================
  /tools:
    get:
      tags: [Tools]
      summary: List tools
      operationId: listTools
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tool'

    post:
      tags: [Tools]
      summary: Create tool
      operationId: createTool
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateToolDto'
      responses:
        '201':
          description: Tool created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'

  # ==================== ANALYTICS ====================
  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get dashboard data
      operationId: getDashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardData'

  /analytics/tokens:
    get:
      tags: [Analytics]
      summary: Get token usage
      operationId: getTokenUsage
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Token usage data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenUsage'

  # ==================== AUDIT ====================
  /audit:
    get:
      tags: [Audit]
      summary: List audit logs
      operationId: listAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: action
          in: query
          schema:
            type: string
        - name: resource
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

  /audit/export:
    get:
      tags: [Audit]
      summary: Export audit logs
      operationId: exportAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        '200':
          description: Exported audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'

  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # Auth
    RegisterDto:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginDto:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, user, viewer]
        createdAt:
          type: string
          format: date-time

    # Agents
    AgentStatus:
      type: string
      enum: [active, inactive, draft]

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
        maxTokens:
          type: integer
        status:
          $ref: '#/components/schemas/AgentStatus'
        version:
          type: integer
        tools:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateAgentDto:
      type: object
      required: [name, model]
      properties:
        name:
          type: string
        description:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
        maxTokens:
          type: integer
        status:
          $ref: '#/components/schemas/AgentStatus'
        tools:
          type: array
          items:
            type: string

    UpdateAgentDto:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        model:
          type: string
        systemPrompt:
          type: string
        temperature:
          type: number
        maxTokens:
          type: integer
        status:
          $ref: '#/components/schemas/AgentStatus'
        tools:
          type: array
          items:
            type: string

    AgentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # Runs
    RunStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]

    Run:
      type: object
      properties:
        id:
          type: string
        agentId:
          type: string
        input:
          type: string
        output:
          type: string
        status:
          $ref: '#/components/schemas/RunStatus'
        duration:
          type: integer
        tokensUsed:
          type: integer
        error:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateRunDto:
      type: object
      required: [agentId, input]
      properties:
        agentId:
          type: string
        input:
          type: string
          minLength: 1

    RunListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Run'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # Tools
    Tool:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        schema:
          type: object
        isActive:
          type: boolean

    CreateToolDto:
      type: object
      required: [name, type, schema]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
        schema:
          type: object
        implementation:
          type: string

    # Analytics
    DashboardData:
      type: object
      properties:
        overview:
          type: object
          properties:
            totalAgents:
              type: integer
            activeAgents:
              type: integer
            totalRuns:
              type: integer
            runsToday:
              type: integer

    TokenUsage:
      type: object
      properties:
        total:
          type: integer
        byProvider:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              tokens:
                type: integer
              cost:
                type: number

    # Audit
    AuditLog:
      type: object
      properties:
        id:
          type: string
        action:
          type: string
        resource:
          type: string
        resourceId:
          type: string
        userId:
          type: string
        details:
          type: object
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    # Common
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string

security:
  - bearerAuth: []
